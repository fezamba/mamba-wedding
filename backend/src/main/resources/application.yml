spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_ROOT}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  profiles:
    active: dsv # Change to 'prd' for production environment

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
    open-in-view: false

# TODO: Switch to neo4j in future
  mongodb:
    uri: ${MONGO_URL}
    
server:
  port: 8080

logging:
  level:
    root: INFO
    '[org.hibernate.SQL]': DEBUG

springdoc: 
  api-docs:
    enabled: true # Change to 'false' to disable Swagger in production
  swagger-ui:
    enabled: true # Change to 'false' to disable Swagger in production

api:
  security:
    token:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER}
      expiration-hours: 2